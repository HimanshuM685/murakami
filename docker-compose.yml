services:

  vault:
    image: hashicorp/vault:1.15.6
    container_name: vault
    ports:
      - "8200:8200"
    restart: unless-stopped
    volumes:
      - ./volumes/vault/logs:/vault/logs
      - ./volumes/vault/file:/vault/file
    environment:
      VAULT_LOCAL_CONFIG: '{"storage": {"file": {"path": "/vault/file"}},"listener": {"tcp": {"address": "0.0.0.0:8200","tls_disable": true}},"ui": true}'
      VAULT_ADDR: http://127.0.0.1:8200
    cap_add:
      - IPC_LOCK
    command: server

  pawn:
    build:
      context: .
      dockerfile: ./Dockerfile
    image: pawn-dev
    working_dir: /opt/app
    command: sh -c 'yarn --ignore-engines && yarn start:dev;'
    container_name: pawn
    env_file:
      - .env
    environment:
      NODE_HOST: algod
      NODE_PORT: "8080"
    volumes:
      - .:/opt/app/
      # Named volume (not anonymous) so Docker populates it from the image's
      # pre-built /opt/app/node_modules, which is owned by the `node` user.
      # An anonymous volume here comes up empty + root-owned on a fresh
      # checkout, which breaks `yarn` (running as `node`) with EACCES.
      - node_modules:/opt/app/node_modules
    ports:
      - "3000:3000"
    networks:
      - default
      - algokit_sandbox

networks:
  algokit_sandbox:
    external: true
    name: algokit_sandbox_default

volumes:
  node_modules:
